<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ExpeAR Pro - Restauro Architettonico</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#070707">

    <link rel="stylesheet" href="styles.css">
    <style>
        /* ===== AR Restoration UI ===== */

        /* --- Video & Canvas layers --- */
        #video-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        canvas#overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        #three-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* --- Start overlay --- */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        #start-overlay h1 {
            color: var(--p-gold);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        #start-overlay p {
            color: var(--p-dim);
            font-size: 0.8rem;
            margin-bottom: 30px;
        }

        .start-btn {
            background: var(--p-gold);
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            box-shadow: 0 0 30px var(--p-gold-glow);
            margin-bottom: 20px;
        }

        #start-status {
            color: #0f0;
            font-size: 0.6rem;
        }

        /* --- Tracking status badge --- */
        .status-badge {
            position: fixed;
            top: env(safe-area-inset-top, 8px);
            left: 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--p-dim);
            z-index: 2003;
            pointer-events: none;
            white-space: nowrap;
            margin-top: 6px;
            transition: color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        .status-badge.tracking {
            border-color: var(--p-gold);
            box-shadow: 0 0 12px var(--p-gold-glow);
        }

        /* --- Top-right toolbar --- */
        .ar-toolbar {
            position: fixed;
            top: env(safe-area-inset-top, 8px);
            right: 12px;
            display: flex;
            gap: 6px;
            z-index: 2002;
            margin-top: 36px;
        }

        .ar-toolbar button {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--p-dim);
            padding: 7px 12px;
            border-radius: 8px;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .ar-toolbar button:active {
            background: rgba(255, 255, 255, 0.12);
            color: var(--p-white);
        }

        /* --- Bottom restoration tray --- */
        #restoration-ui {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            pointer-events: none;
            z-index: 2000;
            padding: 0 8px env(safe-area-inset-bottom, 8px);
        }

        .restoration-tray {
            background: rgba(12, 12, 16, 0.78);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 12px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 52vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,179,0,0.3) transparent;
        }

        .restoration-tray::-webkit-scrollbar { width: 4px; }
        .restoration-tray::-webkit-scrollbar-thumb { background: rgba(255,179,0,0.3); border-radius: 2px; }
        .restoration-tray::-webkit-scrollbar-track { background: transparent; }

        /* --- Collapsible section --- */
        .ctrl-section {
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            overflow: hidden;
        }
        .ctrl-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            background: rgba(255,255,255,0.03);
        }
        .ctrl-section-header:active { background: rgba(255,179,0,0.08); }
        .ctrl-section-title {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--p-gold);
            text-transform: uppercase;
        }
        .ctrl-section-arrow {
            font-size: 0.55rem;
            color: var(--p-dim);
            transition: transform 0.2s;
        }
        .ctrl-section.collapsed .ctrl-section-arrow { transform: rotate(-90deg); }
        .ctrl-section-body {
            padding: 6px 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: max-height 0.25s ease, opacity 0.2s ease;
            max-height: 600px;
            opacity: 1;
        }
        .ctrl-section.collapsed .ctrl-section-body {
            max-height: 0;
            opacity: 0;
            padding: 0 10px;
            overflow: hidden;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slider-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            color: var(--p-gold);
            text-transform: uppercase;
        }

        .percentage {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--p-white);
        }

        /* --- Slider --- */
        .restoration-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        .restoration-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--p-white);
            border: 2px solid var(--p-gold);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px var(--p-gold-glow);
            transition: transform 0.2s;
        }

        .restoration-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* --- Settings rows --- */
        .settings-row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .settings-row label {
            font-size: 0.55rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--p-dim);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .settings-row input[type="number"] {
            width: 52px;
            padding: 4px 6px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.06);
            color: var(--p-white);
            font-size: 0.7rem;
            text-align: center;
            outline: none;
        }

        .settings-row input[type="range"] {
            flex: 1;
            min-width: 60px;
            max-width: 120px;
        }

        .settings-row .fps-val {
            font-size: 0.6rem;
            color: var(--p-dim);
            min-width: 20px;
            text-align: right;
        }

        /* Toggle row for checkboxes */
        .toggle-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 8px;
        }
        .toggle-grid label {
            font-size: 0.55rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--p-dim);
            padding: 4px 0;
            min-height: 28px;
        }
        .toggle-grid input[type="checkbox"] {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* --- Progress bar --- */
        #fbx-progress-container {
            display: none;
            align-items: center;
            gap: 8px;
        }

        #fbx-progress-container progress {
            width: 100%;
            height: 6px;
            border-radius: 3px;
        }

        #fbx-progress-label {
            font-size: 0.6rem;
            color: var(--p-dim);
            white-space: nowrap;
        }

        /* --- Tray scale labels --- */
        .scale-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.1em;
        }

        /* --- Bottom action buttons --- */
        .tray-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding-top: 4px;
        }

        .tray-actions button {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--p-dim);
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            min-height: 36px;
        }

        .tray-actions button:active {
            background: rgba(255, 179, 0, 0.15);
            color: var(--p-gold);
        }

        .tray-actions .btn-accent {
            border-color: var(--p-gold);
            color: var(--p-gold);
        }
    </style>
</head>

<body>
    <!-- Start overlay -->
    <div id="start-overlay">
        <h1>EXPEAR RESTAURO</h1>
        <p>Tocca per avviare la fotocamera e iniziare il restauro.<br>
        (per usare un solo marker aggiungi <code>?single=1</code> all'URL)</p>
        <button class="start-btn" id="start-ar-btn">AVVIA FOTOCAMERA</button>
        <p id="start-status"></p>
    </div>

    <!-- Video / Canvas / 3D layers -->
    <div id="video-container">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="overlay"></canvas>
        <div id="three-container"></div>
    </div>

    <!-- Tracking badge -->
    <div class="status-badge" id="tracking-status">IN ATTESA DI TARGET...</div>

    <!-- Top-right toolbar -->
    <div class="ar-toolbar">
        <button id="enter-ar-btn" style="display:none">ENTRA AR</button>
    </div>

    <!-- Bottom restoration tray -->
    <div id="restoration-ui">
        <div class="restoration-tray">
            <!-- Restoration slider (always visible) -->
            <div class="slider-header">
                <span class="slider-label">Livello Restauro</span>
                <span class="percentage" id="percent-label">0%</span>
            </div>
            <input type="range" min="0" max="100" value="0" class="restoration-slider" id="restoration-range">
            <div class="scale-labels"><span>STATO ATTUALE</span><span>RESTAURATA</span></div>

            <!-- House scale control -->
            <div class="slider-header" style="margin-top:12px;">
                <span class="slider-label">Scala Casa</span>
                <span class="percentage" id="size-label">1.0×</span>
            </div>
            <input type="range" min="0.5" max="10" value="1" step="0.1" class="restoration-slider" id="size-slider">

            <!-- Progress bar -->
            <div id="fbx-progress-container">
                <progress id="fbx-progress" max="100" value="0"></progress>
                <div id="fbx-progress-label">Caricamento modello...</div>
            </div>

            <!-- Actions (always visible) -->
            <div class="tray-actions">
                <button id="calib-btn">CALIBRA</button>
                <button id="capture-btn" class="btn-accent">CATTURA</button>
                <button id="reset-cam">RESET</button>
            </div>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
        onerror="window.log && window.log('Errore Three.js CDN','error')"></script>
    <script>
        // fflate failover chain
        (function () {
            var cdns = [
                'vendor/fflate.min.js',
                'https://cdnjs.cloudflare.com/ajax/libs/fflate/0.8.0/fflate.min.js',
                'https://unpkg.com/fflate@0.8.0/lib/browser.min.js',
                'https://cdn.jsdelivr.net/npm/fflate@0.8.0/lib/browser.min.js'
            ];
            function loadFflate(idx) {
                if (idx >= cdns.length) { window.log && window.log('fflate fallito ovunque', 'error'); return; }
                var s = document.createElement('script');
                s.src = cdns[idx];
                s.onload = function () { window.log && window.log('fflate OK (' + cdns[idx] + ')'); };
                s.onerror = function () { loadFflate(idx + 1); };
                document.head.appendChild(s);
            }
            loadFflate(0);
        })();
    </script>
    <script>
        // size-slider hook (outside of fflate IIFE)
        document.addEventListener('DOMContentLoaded', () => {
            const slider = document.getElementById('size-slider');
            const label = document.getElementById('size-label');
            if (slider && label) {
                window.houseScaleMultiplier = parseFloat(slider.value);
                slider.oninput = () => {
                    const v = parseFloat(slider.value);
                    window.houseScaleMultiplier = v;
                    label.textContent = v.toFixed(1) + '×';
                    if (window.engine) {
                        const factor = (window.engine.houseSizeMM/1000) * v;
                        if (window.engine.restoredModel) window.engine._scaleModel(window.engine.restoredModel, factor);
                        if (window.engine.destroyedModel) window.engine._scaleModel(window.engine.destroyedModel, factor);
                    }
                };
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"
        onerror="window.log && window.log('Errore FBXLoader','error')"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- js-aruco2 runtime dependency -->
    <script src="vendor/js-aruco2.js"></script>

    <script src="utils/pose-filter.js"></script>

    <!-- App Logic -->
    <script>
        // Global error catcher
        window.onerror = function (msg, url, line, col) {
            if (window.log) window.log('GLOBAL ERROR: ' + msg + ' at ' + line + ':' + col, 'error');
            return false;
        };

        function log(msg, type) {
            type = type || 'info';
            console.log('[' + type + '] ' + msg);
        }
        window.log = log;

        log('Pagina caricata. Controllo librerie...');

        setTimeout(function () {
            if (typeof THREE === 'undefined') log('THREE.js non caricato!', 'error');
            else log('THREE.js v' + THREE.REVISION);
            if (typeof fflate === 'undefined') log('fflate non caricato!', 'error');
            else log('fflate OK');
            if (typeof AR !== 'undefined' && AR.Detector) log('js-aruco2 OK');
            else log('js-aruco2 non caricato!', 'error');
        }, 1200);
    </script>

    <script type="module">
        import { RestorationEngine } from './utils/restoration-engine.js';
        import { SettingsPanel } from './public/js/components/SettingsPanel.js';

        const overlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-ar-btn');
        const startStatus = document.getElementById('start-status');

        const go = async () => {
            if (startBtn.disabled) return;
            startBtn.disabled = true;
            startStatus.textContent = 'Caricamento Engine...';
            window.log('Avvio richiesto...');

            try {
                const engine = new RestorationEngine();
                window.engine = engine; // debug access
                engine.onLog = (msg, type) => {
                    window.log(msg, type);
                    if (startStatus) startStatus.textContent = msg;
                };

                // check for single-marker mode via query string
                const params = new URLSearchParams(window.location.search);
                if (params.has('single')) {
                    // use only marker ID 1 and treat its size as something large
                    engine._validMarkerIds = new Set([1]);
                    engine.markerSizeMM = 150; // 15cm printed marker
                    window.log('Single-marker mode: only ID 1 will be tracked', 'info');
                }

                await engine.init();
                window.log('Engine pronto!');
                
                // --- Init UI Components ---
                new SettingsPanel(engine);

                // Fade out start overlay
                if (typeof gsap !== 'undefined') {
                    gsap.to(overlay, {
                        opacity: 0, duration: 0.8,
                        onComplete: () => overlay.style.display = 'none'
                    });
                } else {
                    overlay.style.display = 'none';
                }

                // ── Wire UI controls ──

                // Restoration slider
                const slider = document.getElementById('restoration-range');
                const pctLabel = document.getElementById('percent-label');
                slider.addEventListener('input', (e) => {
                    pctLabel.textContent = e.target.value + '%';
                    engine.setRestorationLevel(e.target.value / 100);
                });

                // --- WebXR / AR handoff button ---
                // Goal: after marker lock is stable, user can switch to world-tracking AR.
                // Note: true ARKit world tracking is available only when browser/runtime exposes WebXR immersive-ar.
                const enterARBtn = document.getElementById('enter-ar-btn');
                if (enterARBtn && engine && engine.supportsWebXR) {
                    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent || '');
                    let webxrSupported = false;
                    let markerLockFallback = false;
                    let autoWorldArAttempted = false;
                    let autoWorldArFailedNeedTap = false;

                    const updateArButtonLabel = () => {
                        if (!webxrSupported) {
                            if (!markerLockFallback) return;
                            const locked = typeof engine.isWorldAnchorActive === 'function' && engine.isWorldAnchorActive();
                            enterARBtn.textContent = locked ? 'UNLOCK MARKER' : 'LOCK MARKER';
                            return;
                        }
                        if (engine._xrActive) {
                            enterARBtn.textContent = 'ESCI AR';
                            return;
                        }
                        const locked = typeof engine.isWorldAnchorActive === 'function' && engine.isWorldAnchorActive();
                        enterARBtn.textContent = locked ? 'LOCK AR' : 'ENTRA AR';
                    };

                    const tryStartWorldAR = async ({ source = 'manual' } = {}) => {
                        if (!webxrSupported || engine._xrActive) return;
                        try {
                            await engine.startWebXR({ persistPlacement: true });
                            autoWorldArFailedNeedTap = false;
                            updateArButtonLabel();
                            if (source === 'auto') {
                                window.log('World AR avviata automaticamente.', 'info');
                            }
                        } catch (err) {
                            // Typical case on mobile Safari/other browsers: user gesture required.
                            autoWorldArFailedNeedTap = true;
                            updateArButtonLabel();
                            if (source === 'auto') {
                                window.log('Auto-avvio AR non consentito dal browser. Tocca LOCK AR.', 'warn');
                            } else {
                                window.log('WebXR avvio fallito: ' + err.message, 'error');
                            }
                        }
                    };

                    engine.supportsWebXR().then(supported => {
                        webxrSupported = !!supported;
                        enterARBtn.style.display = 'inline-block';

                        if (webxrSupported) {
                            updateArButtonLabel();
                        } else if (isIOS) {
                            markerLockFallback = true;
                            updateArButtonLabel();
                            window.log('Questo browser iOS non espone WebXR immersive-ar: ARKit world-lock richiede app nativa o runtime compatibile.', 'warn');
                            window.log('Fallback attivo: usa LOCK MARKER per bloccare stabilmente la casetta con tracking marker.', 'info');
                        } else {
                            markerLockFallback = true;
                            updateArButtonLabel();
                            window.log('WebXR non supportata: fallback LOCK MARKER abilitato.', 'warn');
                        }
                    }).catch(() => {
                        enterARBtn.style.display = 'inline-block';
                        markerLockFallback = true;
                        updateArButtonLabel();
                    });

                    enterARBtn.addEventListener('click', async () => {
                        if (!webxrSupported) {
                            if (markerLockFallback) {
                                const locked = typeof engine.isWorldAnchorActive === 'function' && engine.isWorldAnchorActive();
                                if (!locked) {
                                    if (typeof engine.forceWorldAnchorLock === 'function') {
                                        const ok = engine.forceWorldAnchorLock();
                                        if (ok) {
                                            window.log('Marker lock attivato: casetta stabilizzata (no world-tracking ARKit).', 'info');
                                        } else {
                                            window.log('LOCK MARKER non attivato: inquadra almeno 2 marker stabili e riprova.', 'warn');
                                        }
                                    }
                                } else {
                                    if (typeof engine.releaseWorldAnchor === 'function') {
                                        engine.releaseWorldAnchor();
                                        window.log('Marker lock disattivato.', 'info');
                                    }
                                }
                                updateArButtonLabel();
                                return;
                            }
                            if (isIOS) {
                                window.log('Per lock in stile Amazon (world tracking persistente) su iPhone serve runtime ARKit/WebXR supportato.', 'warn');
                            }
                            return;
                        }

                        if (!engine._xrActive) {
                            const locked = typeof engine.isWorldAnchorActive === 'function' && engine.isWorldAnchorActive();
                            if (locked) {
                                window.log('Lock marker stabile: avvio world-tracking. In AR tocca una superficie per fissare la casetta.', 'info');
                            } else {
                                window.log('Avvio AR: appena lock marker è stabile, puoi fissare la casetta toccando una superficie.', 'info');
                            }
                            await tryStartWorldAR({ source: 'manual' });
                        } else {
                            engine._endWebXR();
                            updateArButtonLabel();
                        }
                    });

                    // Keep label aligned with marker-lock state while in non-XR mode
                    const buttonTicker = setInterval(() => {
                        if (engine._stopped) {
                            clearInterval(buttonTicker);
                            return;
                        }
                        updateArButtonLabel();

                        // Automatic handoff: once marker-lock is stable, try World AR automatically once.
                        // If browser rejects without user gesture, keep only one manual step: LOCK AR button.
                        if (!webxrSupported || engine._xrActive || autoWorldArAttempted) return;
                        const locked = typeof engine.isWorldAnchorActive === 'function' && engine.isWorldAnchorActive();
                        if (locked) {
                            autoWorldArAttempted = true;
                            window.log('Lock marker raggiunto: tentativo handoff automatico a World AR...', 'info');
                            tryStartWorldAR({ source: 'auto' });
                        }

                        if (autoWorldArFailedNeedTap && locked && !engine._xrActive) {
                            enterARBtn.textContent = 'LOCK AR';
                        }
                    }, 500);

                    // If a saved placement exists, load it (non-intrusive)
                    try {
                        const saved = engine.loadSavedXRPlacement && engine.loadSavedXRPlacement();
                        if (saved) window.log('Posizione XR salvata trovata (usa ENTRA AR per visualizzarla)', 'info');
                    } catch (e) { /* ignore */ }
                }

                // Calibrate focal
                document.getElementById('calib-btn').addEventListener('click', () => {
                    engine.updateFocalFromCamera();
                    window.log('Focale aggiornata: ' + Math.round(engine.focal) + ' px');
                });

                // Capture screenshot
                document.getElementById('capture-btn').addEventListener('click', async () => {
                    try {
                        const url = await engine.captureScreenshot();
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'restauro_' + Date.now() + '.png';
                        a.click();
                        window.log('Screenshot salvato');
                    } catch (err) {
                        window.log('Screenshot fallito: ' + err.message, 'error');
                    }
                });

                // Reset
                document.getElementById('reset-cam').addEventListener('click', () => {
                    engine.stop();
                    window.location.reload();
                });

                window.addEventListener('beforeunload', () => engine.stop());
            } catch (err) {
                startStatus.style.color = '#f44';
                startStatus.textContent = 'ERRORE: ' + err.message;
                startBtn.disabled = false;
                window.log('Start fail: ' + err.message, 'error');
            }
        };

        startBtn.addEventListener('click', go);

        // Auto-start if camera permission already granted
        async function checkCameraPermission() {
            if (!navigator.permissions) return;
            try {
                const p = await navigator.permissions.query({ name: 'camera' });
                const update = () => {
                    if (p.state === 'granted') {
                        startStatus.textContent = 'Permesso concesso — avvio...';
                        go();
                    } else if (p.state === 'prompt') {
                        startStatus.textContent = 'Tocca AVVIA FOTOCAMERA per consentire l\'accesso.';
                    } else if (p.state === 'denied') {
                        startStatus.style.color = '#f44';
                        startStatus.textContent = 'Permesso bloccato — riattivalo nelle impostazioni.';
                    }
                };
                update();
                p.onchange = update;
            } catch (error_) { window.log('Permissions API: ' + error_.message, 'warn'); }
        }
        checkCameraPermission();
        window.log('Sistema pronto.');
    </script>
</body>

</html>
